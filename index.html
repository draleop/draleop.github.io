<script>
// ================= CONFIG =================
// FIX 1: Ensure no trailing slash on the URL
const SUPABASE_URL = "https://jzzwdzcppxbltuueaagn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6endkemNwcHhibHR1dWVhYWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjg0MTQsImV4cCI6MjA4OTUwNDQxNH0.sCdMZlK4O8KAtxkbQj6zdFakko_1ExFsJuDX7-u3qkM";
const GEMINI_API_KEY = "AIzaSyCa3eoBcfswoLcDAgny0IFfmipA_3MhEOo";

// FIX 2: Safe initialization to prevent silent crashes
let supabaseClient = null;
try {
  if (typeof window.supabase !== 'undefined') {
    supabaseClient = window.supabase.createClient(SUPABASE_URL.replace(/\/+$/, ''), SUPABASE_KEY);
  } else {
    console.error("Supabase library did not load.");
  }
} catch (err) {
  console.error("Failed to init Supabase:", err);
}

let currentUser = null;
let currentChatId = null;
window.chatMemory = [];
let workingModelName = null; 

// ================= TOAST NOTIFICATIONS =================
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const colors = {
    success: 'bg-green-100 text-green-800 border-green-200',
    error: 'bg-red-100 text-red-800 border-red-200',
    info: 'bg-blue-100 text-blue-800 border-blue-200',
    warning: 'bg-yellow-100 text-yellow-800 border-yellow-200'
  };
  toast.className = `pointer-events-auto px-4 py-3 rounded-lg border text-sm shadow-lg toast-enter ${colors[type]}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 4000);
}

// ================= INITIALIZATION =================
document.addEventListener('DOMContentLoaded', async () => {
    if (supabaseClient) {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) loadUser(session.user);

        supabaseClient.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_IN' && session) loadUser(session.user);
          if (event === 'SIGNED_OUT') logout();
        });
      } catch(e) {
        console.error("Could not check session:", e);
      }
    }
    
    await findWorkingModel();
});

// ================= AUTO-DETECT MODEL =================
async function findWorkingModel() {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${GEMINI_API_KEY}`);
    const data = await res.json();
    
    if (data.models) {
      const candidates = data.models.filter(m => 
        m.supportedGenerationMethods && 
        m.supportedGenerationMethods.includes("generateContent")
      );
      
      let found = candidates.find(m => m.name.includes("gemini-1.5-flash"));
      if (!found) found = candidates.find(m => m.name.includes("gemini-pro"));
      if (!found && candidates.length > 0) found = candidates[0];
      
      if (found) {
        workingModelName = found.name;
        console.log("Auto-detected working model:", workingModelName);
        showToast('AI connected successfully', 'success');
      } else {
        console.error("No generateContent models found.");
        showToast('No valid AI models found for your API Key.', 'error');
      }
    } else if (data.error) {
       console.error("Model list error:", data.error);
       showToast('AI API Key error: ' + data.error.message, 'error');
    }
  } catch (e) {
    console.error("Failed to fetch model list", e);
    showToast('Could not reach AI service.', 'error');
  }
}

// ================= GEMINI AI =================
async function generateAIResponse(prompt){
  if (!workingModelName) {
      return "⚠️ Error: AI Model not initialized. Check console logs (F12).";
  }

  window.chatMemory.push({role:"user", parts:[{text:prompt}]});
  addMessageToUI('ai', 'Thinking...', true);

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/${workingModelName}:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: window.chatMemory })
    });

    const data = await res.json();
    removeThinkingIndicator();

    if (data.error) {
        return "⚠️ API Error: " + data.error.message;
    }
    
    const reply = data.candidates[0].content.parts[0].text;
    window.chatMemory.push({role:"model", parts:[{text:reply}]});
    return reply;

  } catch(e) {
    removeThinkingIndicator();
    console.error(e);
    return "⚠️ Network Error: Could not reach AI.";
  }
}

function removeThinkingIndicator() {
    const thinkMsg = document.querySelector('.thinking-bubble');
    if (thinkMsg) thinkMsg.remove();
}

// ================= UI =================
function addMessageToUI(role, text, isThinking = false){
  const div = document.createElement('div');
  div.className = `flex gap-3 msg-enter ${role==='user' ? 'justify-end' : ''}`;
  if (isThinking) div.classList.add('thinking-bubble');
  div.innerHTML = `<div class="max-w-md ${role==='user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-800'} rounded-xl px-4 py-2.5 text-sm whitespace-pre-wrap">${text}</div>`;
  if (isThinking) div.querySelector('div').classList.add('animate-pulse', 'text-gray-400');
  document.getElementById('messageList').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function handleKeyDown(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('closed'); }
function newChat(){ 
    currentChatId = null; 
    window.chatMemory = []; 
    document.getElementById('messageList').innerHTML=''; 
    document.getElementById('emptyState').classList.remove('hidden'); 
}

// ================= MODAL =================
function showTab(tab){ 
  document.getElementById('loginForm').classList.toggle('hidden', tab!=='login'); 
  document.getElementById('signupForm').classList.toggle('hidden', tab!=='signup'); 
  document.getElementById('tabLogin').classList.toggle('border-black', tab==='login'); 
  document.getElementById('tabLogin').classList.toggle('text-gray-500', tab!=='login');
  document.getElementById('tabSignup').classList.toggle('border-black', tab==='signup'); 
  document.getElementById('tabSignup').classList.toggle('text-gray-500', tab!=='signup');
  document.getElementById('loginError').classList.add('hidden');
  document.getElementById('signError').classList.add('hidden');
}

function openModal(tab){ 
    showTab(tab); 
    document.getElementById('loginModal').classList.remove('hidden'); 
    document.getElementById('loginModal').classList.add('flex'); 
}

function closeModal(){ 
    document.getElementById('loginModal').classList.add('hidden'); 
    document.getElementById('loginModal').classList.remove('flex');
}

// ================= SUPABASE AUTH =================
async function handleSignup(e){
  e.preventDefault();
  if (!supabaseClient) {
    document.getElementById('signError').textContent = "Auth service is not available. Check your connection.";
    document.getElementById('signError').classList.remove('hidden');
    return;
  }
  const name = document.getElementById('signName').value;
  const email = document.getElementById('signEmail').value;
  const pass = document.getElementById('signPass').value;

  try {
    const { data, error } = await supabaseClient.auth.signUp({
      email: email,
      password: pass,
      options: { data: { name: name } }
    });

    if (error) {
      document.getElementById('signError').textContent = error.message;
      document.getElementById('signError').classList.remove('hidden');
      return;
    }
    
    if (data.user && !data.session) {
        showToast("Account created! Please check your email to verify.", 'success');
        closeModal();
    } else if (data.session) {
        loadUser(data.user);
        closeModal();
    }
  } catch(err) {
    document.getElementById('signError').textContent = "Network error: " + err.message;
    document.getElementById('signError').classList.remove('hidden');
  }
}

async function handleLogin(e){
  e.preventDefault();
  if (!supabaseClient) {
    document.getElementById('loginError').textContent = "Auth service is not available. Check your connection.";
    document.getElementById('loginError').classList.remove('hidden');
    return;
  }
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: pass
    });

    if (error) {
      document.getElementById('loginError').textContent = error.message;
      document.getElementById('loginError').classList.remove('hidden');
      return;
    }

    if (data.user) {
      loadUser(data.user);
      closeModal();
    }
  } catch(err) {
    let msg = "Network error: " + err.message;
    if (err.message && err.message.includes('Failed to fetch')) {
      msg = "Cannot reach server. Is your Supabase project paused? (Free tier auto-pauses after 1 week)";
    }
    document.getElementById('loginError').textContent = msg;
    document.getElementById('loginError').classList.remove('hidden');
  }
}

async function logout(){ 
  if (supabaseClient) await supabaseClient.auth.signOut(); 
  currentUser = null; 
  newChat(); 
  document.getElementById('headerUserDropdown').classList.add('hidden'); 
  document.getElementById('headerUserDropdown').classList.remove('flex');
  document.getElementById('loggedOutBtns').classList.remove('hidden'); 
  document.getElementById('loggedOutBtns').classList.add('flex');
  document.getElementById('historyList').innerHTML = ''; 
  document.getElementById('statusBadge').textContent = 'Guest';
  document.getElementById('statusBadge').className = 'px-2.5 py-1 bg-gray-100 text-gray-600 text-xs rounded-full hidden sm:inline-block';
}

// ================= USER STATE =================
async function loadUser(user){
  currentUser = user;
  document.getElementById('loggedOutBtns').classList.add('hidden');
  const dropdown = document.getElementById('headerUserDropdown');
  dropdown.classList.remove('hidden'); 
  dropdown.classList.add('flex');
  const name = user.user_metadata?.name || 'User';
  document.getElementById('userAvatarHeader').textContent = name[0].toUpperCase();
  document.getElementById('userNameHeader').textContent = name;
  document.getElementById('menuUserName').textContent = name;
  document.getElementById('menuUserEmail').textContent = user.email;
  document.getElementById('statusBadge').textContent = 'Synced';
  document.getElementById('statusBadge').className = 'px-2.5 py-1 bg-green-100 text-green-600 text-xs rounded-full hidden sm:inline-block';
  showToast('Welcome back, ' + name + '!', 'success');
  loadUserHistory();
}

// ================= CHAT =================
async function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim(); 
  if(!text) return;
  document.getElementById('emptyState').classList.add('hidden');
  addMessageToUI('user', text);
  input.value = '';
  const aiReply = await generateAIResponse(text);
  addMessageToUI('ai', aiReply);
  if(currentUser && supabaseClient){
    try {
      const {error} = await supabaseClient.from('chats').insert([{
          user_id: currentUser.id, 
          user_msg: text, 
          ai_msg: aiReply, 
          created_at: new Date()
      }]);
      if(error) console.error("DB Error:", error);
      else loadUserHistory();
    } catch(e) {
      console.error("DB save error:", e);
    }
  }
}

// ================= USER HISTORY =================
async function loadUserHistory(){
  if(!currentUser || !supabaseClient) return;
  const {data, error} = await supabaseClient.from('chats').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false}).limit(10);
  const list = document.getElementById('historyList'); 
  list.innerHTML = '';
  if(error) {
      list.innerHTML = '<p class="text-xs text-red-400 p-2">Error loading history</p>';
      return;
  }
  if(!data || data.length === 0) list.innerHTML = '<p class="text-xs text-gray-400 p-2">No history</p>';
  if(data) {
      data.forEach(d => {
        const div = document.createElement('div');
        div.className = 'p-2 rounded-lg cursor-pointer hover:bg-gray-100 truncate text-gray-700';
        div.textContent = d.user_msg.substring(0, 25) + '...';
        div.onclick = () => loadUserChat(d.id);
        list.appendChild(div);
      });
  }
}

async function loadUserChat(id){
  const {data} = await supabaseClient.from('chats').select('*').eq('id', id);
  if(!data || data.length === 0) return;
  currentChatId = id; 
  document.getElementById('messageList').innerHTML = '';
  document.getElementById('emptyState').classList.add('hidden');
  window.chatMemory = [];
  data.forEach(m => { 
      addMessageToUI('user', m.user_msg); 
      window.chatMemory.push({role:"user", parts:[{text:m.user_msg}]});
      addMessageToUI('ai', m.ai_msg); 
      window.chatMemory.push({role:"model", parts:[{text:m.ai_msg}]});
  });
}

async function deleteHistory(){
  if(!currentUser || !supabaseClient) return;
  if(!confirm("Delete all history?")) return;
  const {error} = await supabaseClient.from('chats').delete().eq('user_id', currentUser.id);
  if(error) return alert("Error: " + error.message);
  newChat(); 
  loadUserHistory();
  toggleUserMenu();
}

// ================= MENU =================
function toggleUserMenu(){ 
    document.getElementById('userMenuDropdown').classList.toggle('hidden'); 
}
document.addEventListener('click', e => {
  const dropdown = document.getElementById('headerUserDropdown'); 
  const menu = document.getElementById('userMenuDropdown'); 
  if(dropdown && menu && !dropdown.contains(e.target)) menu.classList.add('hidden');
});
</script>
